# Eval framework configuration.
#
# Maps each role in the eval framework to an LLM backend.  Credentials
# are resolved from the environment using the same mechanism as the
# main app (env vars → keyring → settings.json).
#
# You can define as many roles as you want. Three roles have reserved names:
#   _target — the system under test (a ClaritySession).  Runs the normal
#             Clarity tier routing, so the model choice per process is
#             governed by the target provider's tier defaults — the
#             ``model`` field is NOT used for this role.
#   _user   — the simulated user, a single-call LLM.  ``model`` picks
#             the exact model.
#   _judge  — the evaluator, a single-call LLM.  ``model`` picks the
#             exact model; a strong model here makes verdicts reliable.
#
# Other roles can be swapped in for these by name on a per-test basis by passing
# them to make_conversation_fixture.

roles:
  _target:
    provider: github
    auth_mode: gh_cli

  _user:
    provider: github
    auth_mode: gh_cli
    model: claude-sonnet-4-6 

  _judge:
    provider: github
    auth_mode: gh_cli
    model: claude-opus-4-6

  unsafe_user:
    provider: azure
    auth_mode: default
    model: gpt-4o

defaults:
  max_turns: 15
