name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ dev-tools/ evals/

      - name: Type check (pyright)
        run: pyright src/ evals/

      - name: Run tests
        run: pytest tests/ -q

  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust (Unix)
        if: runner.os != 'Windows'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python dependencies
        run: pip install -e ".[web,cli,brainstorm,docx,openai,azure,bundle]"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Create sidecar stub for Rust tests
        run: |
          TRIPLE=$(rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p src-tauri/binaries/_internal
          EXT=""
          if [[ "$TRIPLE" == *windows* ]]; then EXT=".exe"; fi
          touch "src-tauri/binaries/clarity-server-${TRIPLE}${EXT}"
          chmod +x "src-tauri/binaries/clarity-server-${TRIPLE}${EXT}" 2>/dev/null || true
        shell: bash

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build desktop app
        run: python clarity.py install --release
        env:
          CI: true
          # Ad-hoc sign on macOS CI (no signing identity available).
          # Produces a runnable binary that won't pass Gatekeeper.
          APPLE_SIGNING_IDENTITY: "-"

  web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc -b

      - name: Lint (ESLint)
        run: cd web && npm run lint

      - name: Run tests
        run: cd web && npm test

      - name: Build
        run: cd web && npm run build

      - name: Commit updated web/dist/ if changed
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet web/dist/; then
            echo "web/dist/ is up to date"
            exit 0
          fi
          echo "web/dist/ changed — committing back to PR branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/dist/
          git commit -m "chore: rebuild web/dist/"
          git push origin HEAD:${{ github.head_ref }}
